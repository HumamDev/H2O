<!--
 * @version 2.5.35
 * Changes: fixed shell, collapsed rail, simplified topbar;
 *          stylesheet href carries ?v=2.5.35 cache-bust because the Tauri
 *          V2 dev server (http://127.0.0.1:1430/) emits no
 *          Last-Modified/ETag/Cache-Control headers, so WKWebView
 *          otherwise serves previously-fetched Studio assets indefinitely
 *          and live CSS/JS edits never reach the desktop window. Bump the
 *          query string each time studio.css or studio.js structural reader
 *          behavior changes;
 *          Appearance / View Options panel mounted in the top-right corner
 *          (trigger added by appearance/appearance-panel.studio.js);
 *          v2.5.10 expanded Light/Sepia theme coverage to the JS-injected
 *          # folder-count toggle, the Local Review summary/list, the
 *          Library nav icon (mask + currentColor), and flat-paper depth
 *          for saved-chat cards;
 *          v2.5.11 themed the sidebar context-menu popup
 *          (.wbSidebarNativeMenu / --folder): flat themed surface +
 *          readable action items in Light/Sepia;
 *          v2.5.12 themed the Local Review badge pills (the "0 known
 *          here / extra / conflict" pills under each review folder row);
 *          v2.5.13 themed the Studio Settings page (route #/settings):
 *          cards, buttons, inputs, log blocks, dividers.
-->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>H2O Studio vNext</title>
  <link rel="stylesheet" href="./studio.css?v=2.5.35" />
</head>
<body data-h2o-studio-mode="1">
  <div class="wbShell">
    <aside class="wbRail" aria-label="Collapsed Studio sidebar">
      <button class="wbIconBtn wbRailOpenBtn" id="railSidebarBtn" type="button" aria-label="Open sidebar" title="Open sidebar" aria-controls="studioSidebar" aria-expanded="false">
        <span class="wbIco" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M4 6.75h16M4 12h16M4 17.25h16" />
          </svg>
        </span>
      </button>
    </aside>

    <aside class="wbSide wbSide--sidebar" id="studioSidebar" aria-label="Studio sidebar">
      <div class="wbSidebarHead">
        <a class="wbSidebarHome" href="#/saved" aria-label="Studio home">
          <span class="wbSidebarHomeMark">H2O</span>
          <span class="wbSidebarHomeBody">
            <span class="wbSidebarHomeTitle">Cockpit Pro</span>
            <span class="wbSidebarHomeMeta">Studio</span>
          </span>
        </a>

        <button class="wbIconBtn" id="sidebarCollapseBtn" type="button" aria-label="Collapse sidebar" title="Collapse sidebar">
          <span class="wbIco" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="m14.5 6.75-5.25 5.25 5.25 5.25" />
            </svg>
          </span>
        </button>
      </div>

      <!--
        v2.8: the visible "Search saved chats" input was replaced with a native-style
        "Search chats" sidebar row that routes into the Library Explorer (which has
        its own page-level search input). The #q input is preserved as a hidden
        node so any existing studio.js read of $("#q")?.value (renderList filter,
        sidebar chat-list filter) still resolves; we just don't render it.
      -->
      <input id="q" type="hidden" value="" autocomplete="off" />

      <nav class="wbSidebarTopNav" aria-label="Studio navigation">
        <a id="wbStudioNavSearch" class="wbStudioNavItem" href="#/library/explorer" data-action="search-chats" aria-label="Search saved chats">
          <span class="wbStudioNavIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <circle cx="11" cy="11" r="6" />
              <path d="m15.5 15.5 4 4" />
            </svg>
          </span>
          <span class="wbStudioNavLabel">Search chats</span>
        </a>
      </nav>

      <!--
        Legacy Library/Saved/Pinned/Archive sidebar block removed in v2.6.
        The single "Library" entry now lives in #wbLibrarySection (injected by
        S0Z1f Library Sidebar Tab). Saved / Pinned / Archive are page-level tabs
        inside the Library page (rendered by S0F1d Library Insights). The hash
        routes #/saved, #/pinned, #/archive are still parsed by studio.js's
        renderList, so any inbound deep link continues to work.
      -->

      <section class="wbSidebarSection wbSidebarSection--folders">
        <div class="wbSideLabel">Folders</div>
        <div id="folderList" class="wbFolderList">
          <div class="wbSideEmpty">Loading folder bindings…</div>
        </div>
      </section>

      <!-- Labels — collapsible section populated by S0Z1g Library Sidebar Sections.
           Starts as a heading-only collapsed state when empty so the sidebar
           stays uncluttered for users without labels yet. -->
      <section class="wbSidebarSection wbSidebarSection--labels">
        <div class="wbSideLabel">Labels</div>
        <div id="labelList" class="wbLabelList">
          <div class="wbSideEmpty">Loading labels…</div>
        </div>
      </section>

      <!-- Categories — un-hidden in v2.7. Populated by S0Z1g from
           H2O.LibraryWorkspace.getCategories(). -->
      <section class="wbSidebarSection wbSidebarSection--categories">
        <div class="wbSideLabel">Categories</div>
        <div id="categoryList" class="wbCategoryList">
          <div class="wbSideEmpty">Loading categories…</div>
        </div>
      </section>

      <!-- Projects — collapsible section populated by S0Z1g from
           H2O.LibraryIndex.facets().byProject. -->
      <section class="wbSidebarSection wbSidebarSection--projects">
        <div class="wbSideLabel">Projects</div>
        <div id="projectList" class="wbProjectList">
          <div class="wbSideEmpty">Loading projects…</div>
        </div>
      </section>

      <section class="wbSidebarSection wbSidebarSection--recent">
        <div class="wbSidebarSectionHead">
          <div id="sidebarChatsLabel" class="wbSideLabel">Current View</div>
          <div id="sidebarChatsMeta" class="wbSideMeta"></div>
        </div>
        <div id="sidebarChatList" class="wbSidebarChatList">
          <div class="wbSideEmpty">Loading chats…</div>
        </div>
      </section>

      <!-- Settings sits at the bottom of the sidebar as a normal product nav
           item (not mixed in with data sections like Folders/Labels). Owns the
           #/settings route which renders the Settings page (Data & Migration,
           Storage Diagnostics). Inside Settings, the Import / Export buttons
           navigate to the existing #/migrate/* routes — no migration backend
           changes; pure UI exposure. -->
      <section class="wbSidebarSection wbSidebarSection--settings">
        <a id="wbStudioNavSettings" class="wbStudioNavItem" href="#/settings" data-action="open-settings" aria-label="Studio settings">
          <span class="wbStudioNavIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </span>
          <span class="wbStudioNavLabel">Settings</span>
        </a>
      </section>
    </aside>

    <div class="wbStage">
      <!-- ── Studio Ribbon (Phase 1a — passive shell) ─────────────────────
           OneNote-inspired tabbed action bar for the currently opened chat.
           Owned by S0Y1a. 🎬 Studio Ribbon - Studio.js; populated only when
           studio.js calls H2O.Studio.ribbon.setContext({ chatType: ... }).
           Default state is hidden; no DOM is mounted until a chat reader
           context is active. The Tauri adapter may re-home this element into
           its desktop chrome strip at runtime; static HTML stays MV3-safe. -->
      <section id="studioRibbon"
               class="wbRibbon"
               role="region"
               aria-label="Studio ribbon"
               data-chat-type=""
               hidden></section>

      <div id="studioRibbonControlParking" class="wbRibbonControlParking" hidden aria-hidden="true">
        <button class="wbRibbonAction wbRibbonRefreshAction" id="refreshBtn" type="button">Refresh</button>
      </div>

      <div id="studioRibbonMetadataParking" class="wbRibbonMetadataParking" hidden aria-hidden="true">
        <div id="categoryStatusRibbon" class="wbCategoryRibbonStatus" hidden></div>

        <div id="categoryAssignWrap" class="wbCategoryTopbar" hidden></div>

        <label class="wbSelectWrap wbSelectWrap--topbar" id="folderAssignWrap" hidden>
          <span class="wbSelectLabel">Folder</span>
          <select id="folderAssignSelect" class="wbSelect" aria-label="Assign selected chat to folder"></select>
        </label>
      </div>

      <header class="wbTop">
        <div class="wbTopGroup wbTopGroup--meta">
          <div class="wbRouteMeta">
            <div id="routeEyebrow" class="wbRouteEyebrow">Saved</div>
            <div id="routeTitle" class="wbRouteTitle">Saved chats</div>
            <div id="routeSummary" class="wbRouteSummary">Archive-backed ChatGPT frame</div>
          </div>
        </div>
        <!-- Right-side actions slot. The Appearance trigger button is
             mounted here by appearance/appearance-panel.studio.js at
             DOMContentLoaded. Leaving the slot empty in markup keeps the
             insertion path module-owned (matches dock/ribbon ownership). -->
        <div class="wbTopGroup wbTopGroup--actions" data-role="topbar-actions"></div>
      </header>

      <main class="wbMain">
        <section id="viewListPanel" class="wbPanel wbPanel--list">
          <header class="wbPanelHead">
            <div class="wbPanelTitles">
              <div id="listTitle" class="wbPanelTitle">Saved chats</div>
              <div id="listSubtitle" class="wbPanelSubtitle">Loading…</div>
            </div>
            <div id="listFilters" class="wbFilterBar" aria-live="polite"></div>
          </header>

          <section id="viewList" class="wbHistory"></section>
        </section>

        <section id="viewReader" class="wbReader" hidden></section>
      </main>

      <!-- ── Studio Dock Panel shell (Phase 2A — UI shell, no tabs) ───────
           Visible Dock container. Hidden by default; the dock-shell
           module (src-surfaces-base/studio/dock/dock-shell.studio.js)
           auto-mounts onto this element at DOMContentLoaded and
           toggles the `wbDock--open` class via open() / close().
           CSS additionally route-gates visibility to reader routes
           only (`body[data-route="reader"] #studioDock.wbDock--open`).
           Feature tabs (Highlights/Bookmarks/Notes/Navigator/Context/
           Capture) land in Phase 2B; Phase 2A renders only a
           placeholder inside the view area. -->
      <aside id="studioDock" class="wbDock" hidden aria-label="Studio Dock Panel">
        <div class="wbDockRail" data-role="dock-rail" aria-hidden="true"></div>
        <section class="wbDockBody" data-role="dock-body">
          <header class="wbDockHead">
            <div class="wbDockTitle">Dock</div>
            <button type="button" class="wbDockClose" data-dock-action="close" aria-label="Close Dock">×</button>
          </header>
          <div class="wbDockView" data-role="dock-view">
            <div class="wbDockEmpty">Dock tabs will appear in Phase 2B.</div>
          </div>
        </section>
      </aside>
    </div>
  </div>

  <script src="./S0A2a. 🎬 Observer Hub - Studio.js"></script>
  <script src="./S0A1a. 🎬 H2O Core - Studio.js"></script>

  <!-- ── Studio Platform Adapter ────────────────────────────────────────
       Establishes H2O.Studio.platform.* and H2O.Studio.SELECTORS.
       All later Studio scripts may use these instead of chrome.*,
       localStorage, indexedDB, or hardcoded ChatGPT-attribute selectors.
       Contracts: surfaces/studio/STUDIO_PLATFORM_ADAPTER_GUIDE.md,
       STUDIO_PORTABILITY_CONTRACT.md. -->
  <script src="./platform/index.js"></script>
  <script src="./platform/platform.mv3.js"></script>
  <script src="./platform/platform.tauri.js?v=2.5.35"></script>
  <script src="./platform/selectors.contract.js"></script>

  <!-- ── Studio Dock Constants (Phase 0B) ───────────────────────────────
       Passive: attaches H2O.Studio.DockKeys / DockEvents / DockKeyFor.
       No state, no I/O. Loads AFTER platform/ (consistent ordering, no
       runtime dependency on platform) and BEFORE store/ + future dock
       modules so any consumer can read the canonical key strings.
       Contracts: surfaces/studio/dock/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./dock/dock-keys.js"></script>

  <!-- ── Studio Ribbon Keys (Phase 1a) ───────────────────────────────────
       Studio-local constants for the Studio Ribbon (storage keys, event
       names, tab ids, chat-type constants). Passive: loading this file has
       no side effects beyond attaching frozen objects to H2O.Studio.*.
       Loads BEFORE store/prefs.js so future consumers can read constants
       at install time, and BEFORE ribbon-shell.studio.js which depends on
       these constants.
       Contracts: src-surfaces-base/studio/ribbon/README.md. -->
  <script src="./ribbon/ribbon-keys.js"></script>

  <!-- ── Studio Overlay Keys (Phase 2a) ─────────────────────────────────
       Studio-local constants for the edit-overlay subsystem (storage key
       prefix, schema version, event names, reserved op-type and
       target-kind strings). Passive: loading this file has no side
       effects beyond attaching frozen objects to H2O.Studio.*.
       Loads BEFORE store/prefs.js and overlay-applier.studio.js which
       both reference these constants.
       Contracts: src-surfaces-base/studio/overlay/README.md,
                  src-surfaces-base/studio/STUDIO_OVERLAY_CONTRACT.md. -->
  <script src="./overlay/overlay-keys.js"></script>

  <!-- ── Studio Store: Prefs (Phase 1b) ─────────────────────────────────
       Studio-local key-value preferences store. Backs the dock shell's
       open/view persistence and is available as generic KV for future
       Studio UI prefs. Writes routed through H2O.Studio.platform.storage
       when a real adapter is bound; in-memory fallback otherwise.
       Loads BEFORE dock-shell.studio.js so the shell can hydrate
       open/view at install time. The later store/index.js bootstrap
       performs an unconditional H2O.Studio.store reassignment; prefs.js
       installs a property accessor to survive that replacement so the
       script-tag order in this file does not have to move.
       Contracts: surfaces/studio/store/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./store/prefs.js"></script>

  <!-- ── Studio Appearance / View Options (v2.5.8) ──────────────────────
       Top-right options panel: theme (Light/Dark/Sepia), typography
       (Sans/Serif/Mono), font-size, content-width, folders/notes/plain-text
       toggles, plus desktop-only "Always stay on top". Settings persist
       through H2O.Studio.platform.storage; UI is mounted into .wbTop at
       DOMContentLoaded; popover is appended to document.body so it isn't
       confined by .wbStage's stacking context (isolation:isolate). Always-
       on-top forwards to H2O.Studio.platform.window.setAlwaysOnTop (Tauri
       only); the toggle is hidden when that adapter slot is absent.
       Loads AFTER platform/* and store/prefs.js so the store can detect
       the platform; loads BEFORE feature modules so the controls are
       ready by the time studio.js paints route content.
       Contracts: src-surfaces-base/studio/appearance/ (module folder). -->
  <script src="./appearance/appearance-keys.js"></script>
  <script src="./appearance/appearance-store.studio.js"></script>
  <script src="./appearance/appearance-panel.studio.js?v=2.5.35"></script>

  <!-- ── Studio Dock Shell (Phase 1a + 1b) ──────────────────────────────
       Publishes H2O.Studio.dock — passive, mountless tab registry plus
       open/close/toggle/setView state methods. As of Phase 1b the open
       flag and active view id are persisted through
       H2O.Studio.store.prefs (Studio-local keys h2o:studio:dock:*).
       mount/unmount remain no-op stubs; no DOM is touched, no tab is
       painted, no native key is written. Phase 2 will wire the actual
       mount. Loads AFTER dock-keys.js and store/prefs.js, BEFORE store/
       feature entities.
       Contracts: docs/contracts/studio-dock-tab-registration.md,
                  surfaces/studio/dock/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./dock/dock-shell.studio.js"></script>

  <!-- ── Studio Ribbon Shell (Phase 1a) ─────────────────────────────────
       Publishes H2O.Studio.ribbon — a passive registry of ribbon tabs,
       groups, and actions, plus a chat-type context tracker and
       Studio-local UI state (active tab, collapsed) persisted through
       H2O.Studio.store.prefs. mount/unmount are no-op stubs; DOM is owned
       by the S0Y1a surface module. No chat / snapshot / metadata data is
       mutated. Loads AFTER ribbon-keys.js, store/prefs.js, and the dock
       shell.
       Contracts: src-surfaces-base/studio/ribbon/README.md,
                  src-surfaces-base/studio/STUDIO_DEVELOPMENT_RULES.md. -->
  <script src="./ribbon/ribbon-shell.studio.js"></script>

  <!-- ── Studio Overlay Applier (Phase 2a — passive no-op) ──────────────
       Publishes H2O.Studio.overlay — a no-op applier and a baseDigest
       helper for the edit-overlay subsystem. Phase 2a establishes the
       integration point and the drift-detection contract; future
       Phase 2b+ will add the operation dispatch table. Never mutates
       snap.messages or captured DOM. Loads AFTER overlay-keys.js and
       BEFORE store/editOverlay.js (so the store can reuse
       computeBaseDigest if needed).
       Contracts: src-surfaces-base/studio/STUDIO_OVERLAY_CONTRACT.md,
                  src-surfaces-base/studio/overlay/README.md. -->
  <script src="./overlay/overlay-applier.studio.js"></script>

  <!-- ── Studio Overlay Serializer (Phase 2e) ───────────────────────────
       Pure serializer that turns a snapshot + edit-overlay record into
       a Markdown-flavoured transcript matching what the user sees in
       the reader. Used by RibbonBridge.getCleanTranscript({ includeOverlay })
       for the "Copy clean transcript" ribbon action. No DOM access,
       no storage, no I/O. Reads overlay state via the applier's pure
       reducers (computeMessageState / computeStructureState / findSectionContaining)
       so it inherits Phase 2d's active-set filter automatically.
       Loads AFTER overlay-applier.studio.js (depends on its reducers)
       and BEFORE store/editOverlay.js + studio.js (which consume it
       through the RibbonBridge).
       Contracts: src-surfaces-base/studio/STUDIO_OVERLAY_CONTRACT.md,
                  src-surfaces-base/studio/overlay/README.md. -->
  <script src="./overlay/overlay-serializer.studio.js"></script>

  <!-- ── Studio Overlay DOCX Writer (Phase 3c-A) ────────────────────────
       Pure DOCX writer foundation: builds a stored-mode (uncompressed)
       OOXML/WordprocessingML ZIP container from a snapshot + EditOverlay
       record. Public API:
         H2O.Studio.overlayDocxWriter.build({ snap, overlay, headerMeta, opts })
           → { blob, bytes, size, opsApplied, structureApplied, tocIncluded, collapsedSections }
         H2O.Studio.overlayDocxWriter.selfCheck() → { ok, crc32Probe, ... }

       Phase 3c-A is the writer FOUNDATION only — no ribbon wiring, no
       RibbonBridge.exportDocx, no platform-adapter changes. Phase 3c-B
       will compose this module with platform.files.exportBlob and wire
       the Export → DOCX ribbon handler.

       No DOM access, no storage, no I/O. Reads overlay state via the
       applier's pure reducers (computeMessageState / computeStructureState
       / findSectionContaining) so it inherits Phase 2d's active-set
       filter automatically. Loads AFTER overlay-serializer.studio.js
       (depends on the same reducers via H2O.Studio.overlay) and BEFORE
       store/editOverlay.js + studio.js (which will consume it through
       the RibbonBridge in Phase 3c-B).

       No new runtime dependencies. No vendor library. No deflate code —
       ZIP entries use stored mode (method 0). Valid DOCX files are
       accepted by Word, LibreOffice, Pages without compression.
       Contracts: src-surfaces-base/studio/STUDIO_OVERLAY_CONTRACT.md,
                  src-surfaces-base/studio/overlay/README.md. -->
  <script src="./overlay/overlay-docx-writer.studio.js"></script>

  <!-- ── Studio Store (Stage 1: parallel infra) ─────────────────────────
       Registers H2O.Studio.store and the highlights entity store. Loads
       AFTER platform/ so the store can use platform.broadcast.onAnyChange,
       and BEFORE any feature module so they may reference H2O.Studio.store
       once Stages 2+ wire features through it.
       Contracts: surfaces/studio/store/README.md,
       STUDIO_STORAGE_CONTRACT.md. -->
  <script src="./store/index.js"></script>
  <script src="./store/highlights.js"></script>
  <!-- ── Studio Store: Edit Overlay (Phase 2a) ──────────────────────────
       Per-snapshot non-destructive overlay store. One record per
       snapshotId under h2o:studio:edit-overlay:v1:${snapshotId}. Phase 2a
       exposes get/upsert/remove/list/subscribe/selfCheck; no UI wired,
       no ops dispatched. Loads after store/index.js so it can register
       as an entity via __registerEntity, and after
       overlay/overlay-applier.studio.js so it shares the schemaVersion
       constant.
       Contracts: src-surfaces-base/studio/STUDIO_OVERLAY_CONTRACT.md,
                  src-surfaces-base/studio/STUDIO_STORAGE_CONTRACT.md. -->
  <script src="./store/editOverlay.js"></script>
  <!-- ── Studio Store: Context (Phase 1c, read-only) ────────────────────
       Read-only Studio-side façade over native Context Engine keys
       (h2o:prm:cgx:ctxeng:meta/items/ui/history). No write API, no
       Dock UI, no native edits. Loads AFTER store/index.js so it can
       register as an entity via __registerEntity, and AFTER store/prefs.js
       so it shares the same load-order assumptions as other entities.
       Contracts: surfaces/studio/store/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./store/context.js"></script>
  <!-- ── Studio Store: Bookmarks (Phase 1d, read-only) ──────────────────
       Read-only Studio-side façade over the native Bookmarks Engine
       per-chat key (h2o:prm:cgx:bkmrksngne:state:bookmarks_${id}:v1).
       No write API, no Dock UI, no native edits. Loads after
       store/index.js + store/context.js so it can register as an entity
       via __registerEntity alongside its sibling read-only stores.
       Contracts: surfaces/studio/store/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./store/bookmarks.js"></script>
  <!-- ── Studio Store: Notes (Phase 1e, read-only) ──────────────────────
       Read-only Studio-side façade over the native Notes Engine
       per-chat notes + scratch keys
       (h2o:prm:cgx:ntsngn:store:notes:v1:${id}, …:scratch:v1:${id}).
       No write API, no Dock UI, no native edits, no body-version /
       conflict-resolution model in Phase 1e. Loads after store/index.js
       + sibling read-only stores so it can register as an entity via
       __registerEntity alongside context and bookmarks.
       Contracts: surfaces/studio/store/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./store/notes.js"></script>
  <!-- ── Studio Store: Navigator (Phase 1f, read-only) ──────────────────
       Read-only Studio-side façade over the native Navigator Engine
       per-chat state key (h2o:prm:cgx:nvgngn:state:navigator:v1:${id}).
       No write API, no Dock UI, no native edits, no turn-model
       abstraction, no DOM-derived outline. Loads after store/index.js
       + sibling read-only stores so it can register as an entity via
       __registerEntity alongside context, bookmarks, and notes.
       Contracts: surfaces/studio/store/README.md,
                  surfaces/studio/STUDIO_DOCK_PANEL_CONTRACT.md. -->
  <script src="./store/navigator.js"></script>
  <!-- ── Studio Store: Capture (Phase 1g, read-only) ────────────────────
       Read-only Studio-side façade over the native Capture Engine
       per-chat store + ui keys
       (h2o:prm:cgx:capture:store:v1:${id}, …:ui:v1:${id}).
       No write API, no Dock UI, no item creation, no conversion to
       Notes/Bookmarks/Context, no archiving, no live selection.
       Completes the read-only Studio Dock feature-store foundation
       (highlights / context / bookmarks / notes / navigator / capture)

<!--
 * @version 2.5.5
 * Changes: fixed shell, collapsed rail, simplified topbar
-->
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>H2O Studio vNext</title>
  <link rel="stylesheet" href="./studio.css" />
</head>
<body data-h2o-studio-mode="1">
  <div class="wbShell">
    <aside class="wbRail" aria-label="Collapsed Studio sidebar">
      <button class="wbIconBtn wbRailOpenBtn" id="railSidebarBtn" type="button" aria-label="Open sidebar" title="Open sidebar" aria-controls="studioSidebar" aria-expanded="false">
        <span class="wbIco" aria-hidden="true">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
            <path d="M4 6.75h16M4 12h16M4 17.25h16" />
          </svg>
        </span>
      </button>
    </aside>

    <aside class="wbSide wbSide--sidebar" id="studioSidebar" aria-label="Studio sidebar">
      <div class="wbSidebarHead">
        <a class="wbSidebarHome" href="#/saved" aria-label="Studio home">
          <span class="wbSidebarHomeMark">H2O</span>
          <span class="wbSidebarHomeBody">
            <span class="wbSidebarHomeTitle">Cockpit Pro</span>
            <span class="wbSidebarHomeMeta">Studio</span>
          </span>
        </a>

        <button class="wbIconBtn" id="sidebarCollapseBtn" type="button" aria-label="Collapse sidebar" title="Collapse sidebar">
          <span class="wbIco" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <path d="m14.5 6.75-5.25 5.25 5.25 5.25" />
            </svg>
          </span>
        </button>
      </div>

      <!--
        v2.8: the visible "Search saved chats" input was replaced with a native-style
        "Search chats" sidebar row that routes into the Library Explorer (which has
        its own page-level search input). The #q input is preserved as a hidden
        node so any existing studio.js read of $("#q")?.value (renderList filter,
        sidebar chat-list filter) still resolves; we just don't render it.
      -->
      <input id="q" type="hidden" value="" autocomplete="off" />

      <nav class="wbSidebarTopNav" aria-label="Studio navigation">
        <a id="wbStudioNavSearch" class="wbStudioNavItem" href="#/library/explorer" data-action="search-chats" aria-label="Search saved chats">
          <span class="wbStudioNavIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
              <circle cx="11" cy="11" r="6" />
              <path d="m15.5 15.5 4 4" />
            </svg>
          </span>
          <span class="wbStudioNavLabel">Search chats</span>
        </a>
      </nav>

      <!--
        Legacy Library/Saved/Pinned/Archive sidebar block removed in v2.6.
        The single "Library" entry now lives in #wbLibrarySection (injected by
        S0Z1f Library Sidebar Tab). Saved / Pinned / Archive are page-level tabs
        inside the Library page (rendered by S0F1d Library Insights). The hash
        routes #/saved, #/pinned, #/archive are still parsed by studio.js's
        renderList, so any inbound deep link continues to work.
      -->

      <section class="wbSidebarSection wbSidebarSection--folders">
        <div class="wbSideLabel">Folders</div>
        <div id="folderList" class="wbFolderList">
          <div class="wbSideEmpty">Loading folder bindings…</div>
        </div>
      </section>

      <!-- Labels — collapsible section populated by S0Z1g Library Sidebar Sections.
           Starts as a heading-only collapsed state when empty so the sidebar
           stays uncluttered for users without labels yet. -->
      <section class="wbSidebarSection wbSidebarSection--labels">
        <div class="wbSideLabel">Labels</div>
        <div id="labelList" class="wbLabelList">
          <div class="wbSideEmpty">Loading labels…</div>
        </div>
      </section>

      <!-- Categories — un-hidden in v2.7. Populated by S0Z1g from
           H2O.LibraryWorkspace.getCategories(). -->
      <section class="wbSidebarSection wbSidebarSection--categories">
        <div class="wbSideLabel">Categories</div>
        <div id="categoryList" class="wbCategoryList">
          <div class="wbSideEmpty">Loading categories…</div>
        </div>
      </section>

      <!-- Projects — collapsible section populated by S0Z1g from
           H2O.LibraryIndex.facets().byProject. -->
      <section class="wbSidebarSection wbSidebarSection--projects">
        <div class="wbSideLabel">Projects</div>
        <div id="projectList" class="wbProjectList">
          <div class="wbSideEmpty">Loading projects…</div>
        </div>
      </section>

      <section class="wbSidebarSection wbSidebarSection--recent">
        <div class="wbSidebarSectionHead">
          <div id="sidebarChatsLabel" class="wbSideLabel">Current View</div>
          <div id="sidebarChatsMeta" class="wbSideMeta"></div>
        </div>
        <div id="sidebarChatList" class="wbSidebarChatList">
          <div class="wbSideEmpty">Loading chats…</div>
        </div>
      </section>

      <!-- Settings sits at the bottom of the sidebar as a normal product nav
           item (not mixed in with data sections like Folders/Labels). Owns the
           #/settings route which renders the Settings page (Data & Migration,
           Storage Diagnostics). Inside Settings, the Import / Export buttons
           navigate to the existing #/migrate/* routes — no migration backend
           changes; pure UI exposure. -->
      <section class="wbSidebarSection wbSidebarSection--settings">
        <a id="wbStudioNavSettings" class="wbStudioNavItem" href="#/settings" data-action="open-settings" aria-label="Studio settings">
          <span class="wbStudioNavIcon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" focusable="false" aria-hidden="true">
              <circle cx="12" cy="12" r="3" />
              <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
          </span>
          <span class="wbStudioNavLabel">Settings</span>
        </a>
      </section>
    </aside>

    <div class="wbStage">
      <header class="wbTop">
        <div class="wbTopGroup wbTopGroup--meta">
          <div class="wbRouteMeta">
            <div id="routeEyebrow" class="wbRouteEyebrow">Saved</div>
            <div id="routeTitle" class="wbRouteTitle">Saved chats</div>
            <div id="routeSummary" class="wbRouteSummary">Archive-backed ChatGPT frame</div>
          </div>
        </div>

        <div class="wbTopGroup wbTopGroup--actions">
          <div id="categoryAssignWrap" class="wbCategoryTopbar" hidden></div>

          <label class="wbSelectWrap wbSelectWrap--topbar" id="folderAssignWrap" hidden>
            <span class="wbSelectLabel">Folder</span>
            <select id="folderAssignSelect" class="wbSelect" aria-label="Assign selected chat to folder"></select>
          </label>

          <button class="wbBtn wbBtn--topbar" id="refreshBtn" type="button">Refresh</button>
        </div>
      </header>

      <main class="wbMain">
        <section id="viewListPanel" class="wbPanel wbPanel--list">
          <header class="wbPanelHead">
            <div class="wbPanelTitles">
              <div id="listTitle" class="wbPanelTitle">Saved chats</div>
              <div id="listSubtitle" class="wbPanelSubtitle">Loading…</div>
            </div>
            <div id="listFilters" class="wbFilterBar" aria-live="polite"></div>
          </header>

          <section id="viewList" class="wbHistory"></section>
        </section>

        <section id="viewReader" class="wbReader" hidden></section>
      </main>
    </div>
  </div>

  <script src="./S0A2a. 🎬 Observer Hub - Studio.js"></script>
  <script src="./S0A1a. 🎬 H2O Core - Studio.js"></script>

  <!-- ── Studio Platform Adapter ────────────────────────────────────────
       Establishes H2O.Studio.platform.* and H2O.Studio.SELECTORS.
       All later Studio scripts may use these instead of chrome.*,
       localStorage, indexedDB, or hardcoded ChatGPT-attribute selectors.
       Contracts: surfaces/studio/STUDIO_PLATFORM_ADAPTER_GUIDE.md,
       STUDIO_PORTABILITY_CONTRACT.md. -->
  <script src="./platform/index.js"></script>
  <script src="./platform/platform.mv3.js"></script>
  <script src="./platform/platform.tauri.js"></script>
  <script src="./platform/selectors.contract.js"></script>

  <!-- ── Studio Store (Stage 1: parallel infra) ─────────────────────────
       Registers H2O.Studio.store and the highlights entity store. Loads
       AFTER platform/ so the store can use platform.broadcast.onAnyChange,
       and BEFORE any feature module so they may reference H2O.Studio.store
       once Stages 2+ wire features through it.
       Contracts: surfaces/studio/store/README.md,
       STUDIO_STORAGE_CONTRACT.md. -->
  <script src="./store/index.js"></script>
  <script src="./store/highlights.js"></script>
  <script src="./store/libraryIndex.js"></script>
  <!-- Desktop-only: SQLite-backed chats entity (M2a-3a). Self-detects Tauri
       and silently no-ops on MV3 / web. Backs the `chats` table defined in
       apps/studio/desktop/src-tauri/src/lib.rs (Migrations v2 + v4). -->
  <script src="./store/chats.tauri.js"></script>
  <!-- Desktop-only: SQLite-backed snapshots entity (M2a-3b). Backs the
       snapshots + snapshot_turns tables (Migration v5). Same self-detect
       gating as chats.tauri.js. -->
  <script src="./store/snapshots.tauri.js"></script>
  <!-- Desktop-only: SQLite-backed folders entity (M2a-3c). Backs the
       folders + folder_bindings tables (Migration v3). Same self-detect
       gating as chats.tauri.js. listChats() delegates to store.chats; load
       order matters here (chats.tauri.js loads above). -->
  <script src="./store/folders.tauri.js"></script>
  <!-- Desktop-only: SQLite-backed labels entity (M2a-3d). Backs the
       labels + label_bindings tables (Migration v3). Composite binding PK
       allows multiple labels per chat. Same gating + store.chats
       delegation pattern as folders.tauri.js. -->
  <script src="./store/labels.tauri.js"></script>
  <!-- Desktop-only: SQLite-backed tags entity (M2a-3e). Backs the
       tags + tag_bindings tables (Migration v3). Same composite-PK shape
       as labels. Tags carries an auto_derived boolean and has no
       updated_at column. -->
  <script src="./store/tags.tauri.js"></script>
  <!-- Desktop-only: SQLite-backed categories entity (M2a-3f). Backs the
       categories table only (no category_bindings) — chat assignment
       lives in chats.category_id. assignChat / clearChat write directly
       to chats via raw SQL; listChats delegates to store.chats. -->
  <script src="./store/categories.tauri.js"></script>
  <!-- Desktop-only: full-bundle ingestion (M2b-1). Self-bails on MV3 / web.
       Registers H2O.Studio.ingestion with dryRunImportBundle (read-only) +
       importBundle stub. Routes through callArchive's Desktop branch for
       dryRunImportFullBundle / importFullBundle so the existing
       #/migrate/import UI works unchanged. Must load after store/*.tauri.js
       since dry-run reads via the store public APIs. -->
  <script src="./ingestion/import-bundle.tauri.js"></script>

  <script src="./S1A1a. 🎬 MiniMap Kernel - Studio.js"></script>
  <script src="./S1A1f. 🎬 MiniMap Views - Studio.js"></script>
  <script src="./S1A1e. 🎬 MiniMap Skin - Studio.js"></script>
  <script src="./S1A1d. 🎬 MiniMap Shell - Studio.js"></script>
  <script src="./S1A1b. 🎬 MiniMap Core - Studio.js"></script>
  <script src="./S1A1c. 🎬 MiniMap Engine - Studio.js"></script>

  <script src="./S3H1a. 🎬 Highlights Engine - Studio.js"></script>
  <script src="./S1A3a. 🎬 Highlight Dots - Studio.js"></script>
  <script src="./S1A2a. 🎬 Answer Wash Engine - Studio.js"></script>
  <script src="./S1C1a. 🎬 Turn Title Bar - Studio.js"></script>

  <script src="./S2A1a. 🎬 Question Wrapper - Studio.js"></script>
  <script src="./S2B1a. 🎬 Quote Tracker - Studio.js"></script>
  <script src="./S2C1a. 🎬 Question Wash Engine - Studio.js"></script>

  <script src="./S1Z1a. 🎬 Answer Timestamp - Studio.js"></script>
  <script src="./S2Z1a. 🎬 Question Timestamp - Studio.js"></script>
  <script src="./S1X1a. 🎬 Answer Numbers - Studio.js"></script>

  <script src="./S0D3e. 🎬 Transcript Studio Host - Studio.js"></script>

  <!-- ── Library subsystem (Studio) ─────────────────────────────────────── -->
  <!-- Surface Host first: registers Studio-specific ui-shell, page-host,
       native-sidebar, route, chat-list services for Library Core to consume. -->
  <script src="./S0F0a. 🎬 Library Surface Host - Studio.js"></script>
  <!-- Phase 2A shared registry core: pure merge/normalize/repair logic
       consumed by S0F1g Chat Registry. Body byte-identical to
       shared/library/chat-registry-core.js and scripts/0F0c. mirror. Must
       load before S0F1g so the shared module is available at first read. -->
  <script src="./S0F0c. 🎬 Library Registry Core - Studio.js"></script>
  <!-- Phase 2B shared library-index core: pure row normalization, merge,
       facet, count, filter, sort, bucketing logic. Consumed by S0F1c.
       Body byte-identical to shared/library/library-index-core.js and
       scripts/0F0d. mirror. Must load before S0F1c. -->
  <script src="./S0F0d. 🎬 Library Index Core - Studio.js"></script>
  <!-- Phase 3B shared folder provider core: pure folder catalog + binding
       normalization logic. Runtime copy of shared/library/folder-provider-core.js
       and scripts/0F0e. mirror. Loaded before folder owners for later delegation. -->
  <script src="./S0F0e. 🎬 Folder Provider Core - Studio.js"></script>
  <!-- Phase 4B shared category provider core: pure category catalog, assignment,
       override, candidate, and count normalization logic. Runtime copy of
       shared/library/category-provider-core.js and scripts/0F0f. mirror. Loaded
       before category owners for later delegation. -->
  <script src="./S0F0f. 🎬 Category Provider Core - Studio.js"></script>
  <!-- Phase 5B shared tag provider core: pure tag catalog, binding, occurrence,
       auto-pool, tag/category link, and count normalization logic. Runtime copy
       of shared/library/tag-provider-core.js and scripts/0F0g. mirror. Loaded
       before tag owners for later delegation. -->
  <script src="./S0F0g. 🎬 Tag Provider Core - Studio.js"></script>
  <!-- Phase 5C shared label provider core: pure label catalog, binding,
       summary, and count normalization logic. Runtime copy of
       shared/library/label-provider-core.js and scripts/0F0h. mirror. Loaded
       before label owners for later delegation. -->
  <script src="./S0F0h. 🎬 Label Provider Core - Studio.js"></script>
  <!-- Phase 6B shared project provider core: pure project catalog, cache,
       binding, and count normalization logic. Runtime copy of
       shared/library/project-provider-core.js and scripts/0F0i. mirror. Loaded
       before project owners for later delegation. -->
  <script src="./S0F0i. 🎬 Project Provider Core - Studio.js"></script>
  <!-- Phase 7B shared LibraryActionsCore: pure action target/result planning.
       Runtime copy of shared/library/library-actions-core.js and the native
       0F0j mirror. Loaded before later LibraryActions facade delegation. -->
  <script src="./S0F0j. 🎬 Library Actions Core - Studio.js"></script>
  <!-- Library Core: registry hub. Picks up Surface Host services. -->
  <script src="./S0F1a. 🎬 Library Core - Studio.js"></script>
  <!-- Store + Registry: data layers. Boot independently. -->
  <script src="./S0F1e. 🎬 Library Store - Studio.js"></script>
  <script src="./S0F1g. 🎬 Chat Registry - Studio.js"></script>
  <!-- Index: derived view over archive; feeds Workspace + Insights. -->
  <script src="./S0F1c. 🎬 Library Index - Studio.js"></script>
  <!-- Phase 7D Studio LibraryActions facade: safe Studio command/action API
       backed by pure LibraryActionsCore planning. Loaded before consumers. -->
  <script src="./S0F1j. 🎬 Library Actions - Studio.js"></script>
  <!-- Feature owner facades (read-only/read-write via chat-list service). -->
  <script src="./S0F2a. 🎬 Projects - Studio.js"></script>
  <script src="./S0F3a. 🎬 Folders - Studio.js"></script>
  <script src="./S0F4a. 🎬 Categories - Studio.js"></script>
  <script src="./S0F5a. 🎬 Tags - Studio.js"></script>
  <script src="./S0F6a. 🎬 Labels - Studio.js"></script>
  <!-- Workspace: canonical model facade for studio.js. -->
  <script src="./S0F1b. 🎬 Library Workspace - Studio.js"></script>
  <!-- Insights + Maintenance: renderer + diagnostics. -->
  <script src="./S0F1d. 🎬 Library Insights - Studio.js"></script>
  <script src="./S0F1f. 🎬 Library Maintenance - Studio.js"></script>
  <!-- Cross-surface sync: chrome.storage watcher coalesces changes from native. -->
  <script src="./S0F1h. 🎬 Library Sync - Studio.js"></script>
  <!-- Phase 1 service boundary: canonical service aliases + H2O.flags registry.
       Loads after every Library feature owner so canonical aliases resolve
       to real impls on the first registration pass. Purely additive. -->
  <script src="./S0F1k. 🎬 Library Canonical Services - Studio.js"></script>
  <!-- Studio Command Bar: ⌘K palette exposing Library Maintenance commands. -->
  <script src="./S0X1a. 🎬 Command Bar - Studio.js"></script>
  <!-- Library Commands plugin: registers Workspace / Index / Sync / Registry /
       Navigation / System command groups on the Command Bar. -->
  <script src="./S0X1b. 🎬 Library Commands (Command Bar 🔌 Plugin) - Studio.js"></script>
  <!-- Sidebar entry point: adds Library section to Studio sidebar. -->
  <script src="./S0Z1f. 🎬 Library Sidebar Tab - Studio.js"></script>
  <!-- Sidebar facet sections: populates Labels / Categories / Projects from
       Library data with collapsible headings. -->
  <script src="./S0Z1g. 🎬 Library Sidebar Sections - Studio.js"></script>
  <!-- Studio-side companion of native 9D1a Auto Emoji Title / Title Palette. -->
  <script src="./S9D1a. 🎬 Auto Emoji Title - Studio.js"></script>
  <!-- ─────────────────────────────────────────────────────────────────── -->

  <script src="./studio.js"></script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0D1B2A"/>
      <stop offset="100%" stop-color="#060D14"/>
    </radialGradient>
    <filter id="hud-glow">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="outer-glow">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle grid overlay -->
    <g stroke="#0E3A5C" stroke-width="1" opacity="0.3">
      <line x1="0" y1="256" x2="1024" y2="256"/>
      <line x1="0" y1="512" x2="1024" y2="512"/>
      <line x1="0" y1="768" x2="1024" y2="768"/>
      <line x1="256" y1="0" x2="256" y2="1024"/>
      <line x1="512" y1="0" x2="512" y2="1024"/>
      <line x1="768" y1="0" x2="768" y2="1024"/>
    </g>

    <!-- Outer ring -->
    <circle cx="512" cy="512" r="390" fill="none" stroke="#0A8FE8" stroke-width="2.5" opacity="0.5" filter="url(#outer-glow)"/>
    <!-- Dashed outer ring segments (4 gaps) -->
    <circle cx="512" cy="512" r="390" fill="none" stroke="#0ABAFF" stroke-width="3" stroke-dasharray="110 50 110 50 110 50 110 50" opacity="0.75"/>

    <!-- Mid ring -->
    <circle cx="512" cy="512" r="280" fill="none" stroke="#0ABAFF" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner ring -->
    <circle cx="512" cy="512" r="160" fill="none" stroke="#0ABAFF" stroke-width="2.5" opacity="0.85" filter="url(#hud-glow)"/>

    <!-- Crosshair lines — gap in center -->
    <!-- Top -->
    <line x1="512" y1="110" x2="512" y2="340" stroke="#0ABAFF" stroke-width="2.5" stroke-linecap="round" filter="url(#hud-glow)"/>
    <!-- Bottom -->
    <line x1="512" y1="684" x2="512" y2="914" stroke="#0ABAFF" stroke-width="2.5" stroke-linecap="round" filter="url(#hud-glow)"/>
    <!-- Left -->
    <line x1="110" y1="512" x2="340" y2="512" stroke="#0ABAFF" stroke-width="2.5" stroke-linecap="round" filter="url(#hud-glow)"/>
    <!-- Right -->
    <line x1="684" y1="512" x2="914" y2="512" stroke="#0ABAFF" stroke-width="2.5" stroke-linecap="round" filter="url(#hud-glow)"/>

    <!-- Diagonal tick corners at 45° -->
    <g stroke="#0ABAFF" stroke-width="2" opacity="0.45" stroke-linecap="round">
      <!-- Top-right -->
      <line x1="630" y1="220" x2="648" y2="202"/>
      <!-- Top-left -->
      <line x1="394" y1="220" x2="376" y2="202"/>
      <!-- Bottom-right -->
      <line x1="630" y1="804" x2="648" y2="822"/>
      <!-- Bottom-left -->
      <line x1="394" y1="804" x2="376" y2="822"/>
    </g>

    <!-- Degree ticks on outer ring -->
    <g stroke="#0A8FE8" stroke-width="2" opacity="0.55">
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(0, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(15, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(30, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(45, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(60, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(75, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(90, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(105, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(120, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(135, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(150, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(165, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(180, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(195, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(210, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(225, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(240, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(255, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(270, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(285, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(300, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(315, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="148" transform="rotate(330, 512, 512)"/>
      <line x1="512" y1="122" x2="512" y2="138" transform="rotate(345, 512, 512)"/>
    </g>

    <!-- Center dot -->
    <circle cx="512" cy="512" r="14" fill="#0ABAFF" filter="url(#outer-glow)"/>
    <circle cx="512" cy="512" r="6" fill="white"/>

    <!-- Small data readouts (HUD aesthetic) -->
    <g fill="#0A8FE8" opacity="0.55" font-family="monospace" font-size="28">
      <text x="570" y="475">ALT</text>
      <text x="570" y="560">VEL</text>
      <text x="380" y="475" text-anchor="end">HDG</text>
      <text x="380" y="560" text-anchor="end">STS</text>
    </g>
  </g>
</svg>

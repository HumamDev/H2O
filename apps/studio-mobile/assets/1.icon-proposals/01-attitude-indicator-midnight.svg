<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="icon-clip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <radialGradient id="sky-radial" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#0A2050"/>
      <stop offset="100%" stop-color="#030A1A"/>
    </radialGradient>
    <radialGradient id="earth-radial" cx="50%" cy="75%" r="55%">
      <stop offset="0%" stop-color="#060608"/>
      <stop offset="100%" stop-color="#020203"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bright-glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#icon-clip)">
    <rect x="0" y="0" width="1024" height="512" fill="url(#sky-radial)"/>
    <rect x="0" y="512" width="1024" height="512" fill="url(#earth-radial)"/>
    <!-- Stars -->
    <g fill="white" opacity="0.5">
      <circle cx="180" cy="150" r="2"/>
      <circle cx="320" cy="90" r="1.5"/>
      <circle cx="450" cy="200" r="2"/>
      <circle cx="620" cy="120" r="1.5"/>
      <circle cx="780" cy="200" r="2"/>
      <circle cx="860" cy="80" r="1.5"/>
      <circle cx="240" cy="280" r="1.5"/>
      <circle cx="700" cy="320" r="2"/>
      <circle cx="140" cy="380" r="1.5"/>
      <circle cx="900" cy="300" r="2"/>
    </g>
    <circle cx="512" cy="512" r="440" fill="none" stroke="#030A1A" stroke-width="28"/>
    <circle cx="512" cy="512" r="440" fill="none" stroke="#3A6AFF" stroke-width="2.5" filter="url(#glow)" opacity="0.9"/>
    <g stroke="#1A3888" stroke-width="2" opacity="0.6">
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(0, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(30, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(60, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(90, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(120, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(150, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(180, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(210, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(240, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(270, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(300, 512, 512)"/>
      <line x1="512" y1="72" x2="512" y2="108" transform="rotate(330, 512, 512)"/>
    </g>
    <!-- Horizon line — bright crisp white -->
    <rect x="60" y="504" width="904" height="16" rx="8" fill="white" filter="url(#bright-glow)" opacity="1"/>
    <polygon points="512,95 492,130 532,130" fill="white" opacity="0.95"/>
    <!-- Wing bars — bright electric blue -->
    <rect x="188" y="498" width="220" height="28" rx="14" fill="#5A8FFF" filter="url(#bright-glow)"/>
    <rect x="616" y="498" width="220" height="28" rx="14" fill="#5A8FFF" filter="url(#bright-glow)"/>
    <circle cx="512" cy="512" r="20" fill="white" filter="url(#bright-glow)"/>
    <circle cx="512" cy="512" r="10" fill="#030A1A"/>
    <g stroke="white" stroke-width="3" opacity="0.5" stroke-linecap="round">
      <line x1="372" y1="440" x2="652" y2="440"/>
      <line x1="412" y1="376" x2="612" y2="376"/>
      <line x1="432" y1="312" x2="592" y2="312"/>
    </g>
    <g stroke="#1A2A50" stroke-width="3" opacity="0.5" stroke-linecap="round">
      <line x1="372" y1="584" x2="652" y2="584"/>
      <line x1="412" y1="648" x2="612" y2="648"/>
      <line x1="432" y1="712" x2="592" y2="712"/>
    </g>
    <circle cx="512" cy="512" r="450" fill="none" stroke="white" stroke-width="1.5" opacity="0.1"/>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="clip">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F1923"/>
      <stop offset="100%" stop-color="#060C12"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5D06E"/>
      <stop offset="50%" stop-color="#E8A820"/>
      <stop offset="100%" stop-color="#C47B00"/>
    </linearGradient>
    <linearGradient id="gold-horiz" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C47B00"/>
      <stop offset="50%" stop-color="#F5D06E"/>
      <stop offset="100%" stop-color="#C47B00"/>
    </linearGradient>
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="1024" height="1024" fill="url(#bg-grad)"/>

    <!-- Subtle outer glow ring -->
    <circle cx="512" cy="512" r="450" fill="none" stroke="#E8A820" stroke-width="1" opacity="0.15"/>

    <!-- Outer compass ring -->
    <circle cx="512" cy="512" r="400" fill="none" stroke="#2A1E08" stroke-width="24"/>
    <circle cx="512" cy="512" r="400" fill="none" stroke="#E8A820" stroke-width="2" opacity="0.7"/>
    <circle cx="512" cy="512" r="388" fill="none" stroke="#2A1E08" stroke-width="2"/>

    <!-- Degree ticks on ring -->
    <g stroke="#C89028" stroke-width="2" opacity="0.5">
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(0,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(10,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(20,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(30,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(40,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(50,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(60,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(70,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(80,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(90,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(100,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(110,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(120,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(130,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(140,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(150,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(160,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(170,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(180,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(190,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(200,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(210,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(220,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(230,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(240,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(250,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(260,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(270,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(280,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(290,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(300,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(310,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(320,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="136" transform="rotate(330,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(340,512,512)"/>
      <line x1="512" y1="112" x2="512" y2="122" transform="rotate(350,512,512)"/>
    </g>

    <!-- Cardinal N S E W points (stylized diamonds) -->
    <!-- North – large gold diamond -->
    <polygon points="512,148 528,190 512,225 496,190" fill="url(#gold-grad)" filter="url(#gold-glow)"/>
    <!-- South -->
    <polygon points="512,799 526,836 512,876 498,836" fill="#8A5E10" opacity="0.8"/>
    <!-- East -->
    <polygon points="799,512 836,498 876,512 836,526" fill="#8A5E10" opacity="0.8"/>
    <!-- West -->
    <polygon points="225,512 190,498 148,512 190,526" fill="#8A5E10" opacity="0.8"/>

    <!-- Intercardinal points (smaller diamonds at 45°) -->
    <g fill="#5A3D08" opacity="0.6">
      <polygon points="512,190 522,215 512,235 502,215" transform="rotate(45,512,512)"/>
      <polygon points="512,190 522,215 512,235 502,215" transform="rotate(135,512,512)"/>
      <polygon points="512,190 522,215 512,235 502,215" transform="rotate(225,512,512)"/>
      <polygon points="512,190 522,215 512,235 502,215" transform="rotate(315,512,512)"/>
    </g>

    <!-- Main needle — North (gold) -->
    <polygon points="512,210 526,512 512,540 498,512" fill="url(#gold-grad)" filter="url(#subtle-glow)"/>
    <!-- Main needle — South (dark) -->
    <polygon points="512,814 523,512 512,484 501,512" fill="#3A2A0A" stroke="#6A4A10" stroke-width="1.5"/>

    <!-- Center cap -->
    <circle cx="512" cy="512" r="38" fill="#1A1208" stroke="#E8A820" stroke-width="3"/>
    <circle cx="512" cy="512" r="22" fill="url(#gold-grad)" filter="url(#subtle-glow)"/>
    <circle cx="512" cy="512" r="10" fill="#0F1923"/>
  </g>
</svg>

    <rect x="164" y="164" width="696" height="696" rx="174" fill="url(#panel)" stroke="#BFFBFF" stroke-width="3" opacity=".95" filter="url(#shadow)"/>
    <path d="M724 340c-48-58-120-90-204-90-151 0-270 114-270 262s119 262 270 262c83 0 156-32 204-90" fill="none" stroke="#EFFFFF" stroke-width="70" stroke-linecap="round"/>

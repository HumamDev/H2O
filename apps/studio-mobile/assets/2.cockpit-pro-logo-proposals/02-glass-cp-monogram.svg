    <path d="M530 590v184" fill="none" stroke="#5CF0DF" stroke-width="70" stroke-linecap="round"/>
    <path d="M264 500h202" stroke="#FFC95D" stroke-width="18" stroke-linecap="round" filter="url(#glow)"/>
    <path d="M708 458h118" stroke="#FFC95D" stroke-width="18" stroke-linecap="round"/>
    <path d="M230 228c118-46 285-42 418 11" fill="none" stroke="#FFFFFF" stroke-width="8" opacity=".25" stroke-linecap="round"/>

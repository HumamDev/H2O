<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="Cockpit Pro glass CP monogram icon">
  <defs>
    <clipPath id="clip"><rect width="1024" height="1024" rx="224"/></clipPath>
    <linearGradient id="bg" x1="128" y1="64" x2="900" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#101827"/>
      <stop offset=".45" stop-color="#0E3E59"/>
      <stop offset="1" stop-color="#061016"/>
    </linearGradient>
    <linearGradient id="panel" x1="210" y1="172" x2="816" y2="850" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9FFFF" stop-opacity=".34"/>
      <stop offset=".42" stop-color="#44D6D2" stop-opacity=".16"/>
      <stop offset="1" stop-color="#06131D" stop-opacity=".2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="28" stdDeviation="36" flood-color="#000000" flood-opacity=".45"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <g clip-path="url(#clip)">
